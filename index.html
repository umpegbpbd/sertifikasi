function toggleForm() {
    const kategori = document.getElementById('kategoriSertifikasi').value;
    const formContainer = document.getElementById('formIsian');
    
    if (kategori !== "") {

    } else {
        formContainer.style.display = 'none';
    }
}

async function loadDatabaseGist() {
    document.getElementById('loadingInfo').style.display = 'block';
    try {
        const url = `https://api.github.com/gists/${GIST_ID}`;
        const res = await fetch(url, { headers: { 'Authorization': 'token ' + GITHUB_TOKEN }});
        if(res.ok) {
            const data = await res.json();
            if (data.files && data.files['data_sertifikasi.json']) {
                const content = JSON.parse(data.files['data_sertifikasi.json'].content);
                window.globalDatabase = Array.isArray(content) ? content : Object.values(content);
            } else {
                window.globalDatabase = [];
            }
        }
    } catch(e) { console.log("Database loading error: ", e); }
    document.getElementById('loadingInfo').style.display = 'none';
}

function downloadAdminReport() {
    const password = prompt("Password Admin:");
    if(password !== "adminbpbd") { alert("Password Salah!"); return; }

    const data = [["Nama", "NIP", "Jabatan", "Status", "Kategori Sertifikasi", "Target", "No Sertifikat", "Penyelenggara", "Nama Sertifikasi", "Tahun Perolehan", "Bulan Pelaporan", "Waktu Submit"]];
    
    window.globalDatabase.forEach(db => {
        data.push([
            db.nama || "-",
            db.nip || "-",
            db.jabatan || "-",
            db.status || "-",
            db.kategori_sertifikasi || "-",
            db.target || "-",
            db.nomor_sertifikat || "-",
            db.penyelenggara || "-",
            db.nama_sertifikasi || "-",
            db.tahun_perolehan || "-",
            db.bulan_pelaporan || "-",
            db.waktu_update || "-"
        ]);
    });

    const ws = XLSX.utils.aoa_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Rekap_Sertifikasi");
    XLSX.writeFile(wb, "Laporan_Sertifikasi_ASN.xlsx");
}

async function simpanKeGist() {
    const selectNama = document.getElementById('selectNama');
    const kategoriSertifikasi = document.getElementById('kategoriSertifikasi');
    
    if(!selectNama.value) { alert("Pilih pegawai terlebih dahulu!"); return; }
    if(!kategoriSertifikasi.value) { alert("Pilih kategori sertifikasi!"); return; }
    if(!document.getElementById('target').value || !document.getElementById('tahunPerolehan').value || !document.getElementById('bulanPelaporan').value) {
        alert("Harap lengkapi isian (Target, Tahun, atau Bulan)!"); 
        return;
    }

    const nipPegawai = selectNama.value;
    const recordDatabase = {
        nip: nipPegawai,
        nama: selectNama.options[selectNama.selectedIndex].text,
        jabatan: document.getElementById('jabatan').value,
        rumpun_jabatan: document.getElementById('rumpun').value,
        status: document.getElementById('status').value,
        
        // Isian Form Baru
        kategori_sertifikasi: kategoriSertifikasi.value,
        target: document.getElementById('target').value,
        nomor_sertifikat: document.getElementById('nomorSertifikat').value,
        penyelenggara: document.getElementById('penyelenggara').value,
        nama_sertifikasi: document.getElementById('namaSertifikasi').value,
        tahun_perolehan: document.getElementById('tahunPerolehan').value,
        bulan_pelaporan: document.getElementById('bulanPelaporan').value,
        link_sertifikat: document.getElementById('linkSertifikat').value,
        
        waktu_update: new Date().toLocaleString()
    };

    window.globalDatabase.push(recordDatabase);

    try {
        const response = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
            method: 'PATCH',
            headers: {
                'Authorization': 'token ' + GITHUB_TOKEN,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                files: {
                    "data_sertifikasi.json": { content: JSON.stringify(window.globalDatabase, null, 2) }
                }
            })
        });

        if (response.ok) {
            alert("✅ Terimakasih sudah di input 1927 Wani!");
            location.reload();
        } else {
            const err = await response.json();
            alert("Gagal menyimpan data: " + (err.message || "Unknown error"));
        }
    } catch (error) { alert("Error koneksi: " + error.message); }
}
